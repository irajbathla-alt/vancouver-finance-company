<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vancouver Finance Company — Lenders</title>

  <style>
    :root {
      --bg: #fff;
      --fg: #000;
      --muted: #666;
      --border: #000;
      --radius: 12px;
    }
    * { box-sizing: border-box; }
    body { margin:0; color:var(--fg); background:var(--bg);
      font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    header { position:sticky; top:0; z-index:1000; background:var(--bg);
      border-bottom:1px solid var(--border); padding:12px 12px 8px; }

    /* Brand */
    header .brand { text-align:center; margin:0 auto 6px; }
    header .brand-line1 { display:block; font-size:26px; font-weight:800; }
    header .brand-line2 { display:block; font-size:18px; font-weight:600; }

    /* Search bar */
    .search-bar { margin-top:8px; display:flex; gap:8px; }
    .input { flex:1; border:1px solid var(--border); border-radius:8px; padding:10px; font-size:16px; }
    .btn { border:1px solid var(--border); background:var(--bg); padding:10px 12px; border-radius:8px; cursor:pointer;}

    /* Quick links */
    .quick-links {
      padding:10px 0;
      text-align:center;
      border-bottom:1px solid #000;
    }
    .quick-links a {
      margin:0 6px;
      padding:6px 12px;
      border:1px solid #000;
      border-radius:6px;
      text-decoration:none;
      color:#000;
      font-size:13px;
    }

    /* Region strip */
    #regionStrip {
      display:flex; gap:6px; padding:8px 0;
      border-bottom:1px solid var(--border);
      justify-content:center; align-items:center;
      overflow:hidden; flex-wrap:nowrap;
    }
    #regionStrip button {
      flex:1 1 0;
      white-space:nowrap; padding:6px 8px; font-size:12px;
      border:1px solid var(--border); background:var(--bg); border-radius:8px;
    }
    #regionStrip button.active { background:#000; color:#fff; }

    /* Cards */
    .container { padding:12px; max-width:900px; margin:0 auto; }
    #list { display:grid; grid-template-columns:1fr; gap:12px; }
    .card { background:#fff; border:1px solid var(--border);
      border-radius:var(--radius); }
    .card-body { padding:12px 14px; }
    .card-title { font-size:16px; font-weight:700; margin-bottom:8px; }

    .load-more {
      width:100%; padding:12px; margin:12px auto 80px;
      background:#000; color:#fff; border:0; border-radius:10px;
      font-size:16px;
    }

    footer { text-align:center; padding:18px; color:var(--muted); border-top:1px solid var(--border); }

    /* Add lender FAB */
    .fab { position:fixed; right:16px; bottom:16px; width:56px; height:56px;
      border-radius:50%; background:#000; color:#fff; border:none; font-size:28px;}

    /* Add lender sheet */
    .sheet { position:fixed; left:0; right:0; bottom:0; transform:translateY(100%);
      background:#fff; border-top:1px solid var(--border);
      border-radius:16px 16px 0 0; box-shadow:0 -8px 24px rgba(0,0,0,0.15);
      transition:transform .3s ease; }
    .sheet.open { transform:translateY(0%); }
    .sheet-head { padding:14px; border-bottom:1px solid var(--border);
      display:flex; justify-content:space-between; }
    .sheet-body { padding:14px; }

    .field { margin-bottom:10px; }
    .label { font-size:12px; color:var(--muted); margin-bottom:4px; display:block; }
    .text { width:100%; padding:10px; border:1px solid var(--border); border-radius:8px; }
    .sheet-actions { display:flex; gap:8px; margin-top:12px;}
    .primary { background:#000; color:#fff; border:1px solid #000; }
    .ghost { background:#fff; color:#000; border:1px solid #000; }
  </style>
</head>

<body>

  <header>
    <div class="brand">
      <span class="brand-line1">Vancouver</span>
      <span class="brand-line2">Finance Company</span>
    </div>

    <div class="search-bar">
      <input id="searchInput" class="input" placeholder="Search lenders by company name…" />
    </div>

    <!-- Quick Links -->
    <div class="quick-links">
      <a href="https://app.journeycapital.ca/elending?ls=rajkunwarsingh&emlredir=true" target="_blank">Journey Capital</a>
      <a href="https://app.merchantgrowth.com/?userId=005JR00000ArwOHYAZ" target="_blank">Merchant Growth</a>
    </div>

    <div id="regionStrip"></div>
  </header>

  <div class="container">
    <div id="list"></div>
    <button id="loadMoreBtn" class="load-more">Load more</button>
  </div>

  <footer>© 2025 Vancouver Finance Company</footer>

  <button class="fab" id="fab">+</button>

  <!-- Add Lender Sheet -->
  <div class="sheet" id="sheet">
    <div class="sheet-head">
      <div>Add Lender</div>
      <button class="btn" id="closeSheet">Close</button>
    </div>
    <div class="sheet-body">
      <div class="field">
        <label class="label">Company Name *</label>
        <input class="text" id
